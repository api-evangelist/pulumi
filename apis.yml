aid: pulumi
name: Pulumi
description: Pulumi is a modern infrastructure as code platform that allows you to use familiar programming languages to build,
  deploy, and manage cloud infrastructure. The Pulumi Cloud REST API enables programmatic access to manage organizations,
  stacks, deployments, environments, policy packs, webhooks, and other Pulumi Cloud resources.
