  name: Pulumi Cloud REST API
  description: 'The Pulumi Cloud REST API exposes 446+ endpoints across 28 categories, including access tokens, AI/agents,
    audit logs, change gates and requests, deployments, environments (ESC), insights, OIDC issuers, organizations, policy
    groups and packs, registry, resource search, stacks, and webhooks. Authentication is via the `Authorization: token {token}`
    header.'
