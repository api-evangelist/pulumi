naftiko: 1.0.0-alpha2
info:
  label: Pulumi APIs — AI
  description: 'Pulumi APIs — AI. 1 operations. Lead operation: AITemplate. Self-contained Naftiko capability covering one
    Pulumi business surface.'
  tags:
  - Pulumi
  - AI
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PULUMI_API_KEY: PULUMI_API_KEY
capability:
  consumes:
  - type: http
    namespace: pulumi-ai
    baseUri: ''
    description: Pulumi APIs — AI business capability. Self-contained, no shared references.
    resources:
    - name: api-ai-template
      path: /api/ai/template
      operations:
      - name: aitemplate
        method: POST
        description: AITemplate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: pulumi-ai-rest
    port: 8080
    description: REST adapter for Pulumi APIs — AI. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/ai/template
      name: api-ai-template
      description: REST surface for api-ai-template.
      operations:
      - method: POST
        name: aitemplate
        description: AITemplate
        call: pulumi-ai.aitemplate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pulumi-ai-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pulumi APIs — AI. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: aitemplate
      description: AITemplate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pulumi-ai.aitemplate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
